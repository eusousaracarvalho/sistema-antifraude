<!DOCTYPE html>

<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<title>Sistema Antifraude</title>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>

<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-slate-100">

<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

function App(){

const [nome,setNome] = useState("")
const [cpf,setCpf] = useState("")
const [valor,setValor] = useState("")
const [ticket,setTicket] = useState(1200)

function calcularRisco(){

const venda = Number(valor)

if(!venda) return "—"

if(venda > ticket*2){
return "ALTO"
}

if(venda > ticket){
return "MÉDIO"
}

return "BAIXO"

}

const risco = calcularRisco()

return (

<div className="max-w-3xl mx-auto mt-16 bg-white p-10 rounded-2xl shadow">

<h1 className="text-3xl font-bold mb-8">
Sistema Antifraude
</h1>

<div className="space-y-6">

<div>
<label className="block text-sm font-bold mb-1">
Nome do Cliente
</label>

<input
className="w-full border p-3 rounded"
value={nome}
onChange={e=>setNome(e.target.value)}
/>

</div>


<div>
<label className="block text-sm font-bold mb-1">
CPF
</label>

<input
className="w-full border p-3 rounded"
value={cpf}
onChange={e=>setCpf(e.target.value)}
/>
</div>


<div>
<label className="block text-sm font-bold mb-1">
Ticket médio da empresa
</label>

<input
type="number"
className="w-full border p-3 rounded"
value={ticket}
onChange={e=>setTicket(e.target.value)}
/>
</div>


<div>
<label className="block text-sm font-bold mb-1">
Valor da venda
</label>
<input
type="number"
className="w-full border p-3 rounded"
value={valor}
onChange={e=>setValor(e.target.value)}
/>

</div>

<div className="mt-8 p-6 rounded-xl bg-slate-100">

<p className="text-sm">
Resultado da análise:
</p>

<p className="text-3xl font-bold mt-2">

{risco==="ALTO" && <span className="text-red-600">RISCO ALTO</span>}

{risco==="MÉDIO" && <span className="text-yellow-600">RISCO MÉDIO</span>}

{risco==="BAIXO" && <span className="text-green-600">RISCO BAIXO</span>}

</p>

</div>

</div>

</div>

)

}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>)

</script>

</body>
</html>
